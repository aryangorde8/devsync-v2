{# Tailwind v4 (browser build) + Alpine for pages that use utility classes.
   The @theme block maps the Synthesis semantic tokens (defined as CSS vars in
   app.css) onto Tailwind colors so classes like `bg-surface`, `text-on-surface`
   resolve exactly as they did in the Next.js build. #}
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-surface: var(--surface);
    --color-surface-secondary: var(--surface-secondary);
    --color-surface-tertiary: var(--surface-tertiary);
    --color-surface-elevated: var(--surface-elevated);
    --color-surface-hover: var(--surface-hover);
    --color-card: var(--card);
    --color-card-hover: var(--card-hover);
    --color-card-border: var(--card-border);
    --color-on-surface: var(--text-primary);
    --color-on-surface-secondary: var(--text-secondary);
    --color-on-surface-tertiary: var(--text-tertiary);
    --color-outline: var(--border);
    --color-sidebar: var(--sidebar);
    --color-input: var(--input);
    --color-success: var(--success);
    --color-warning: var(--warning);
    --color-error: var(--error);
    --color-info: var(--info);
  }
</style>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
