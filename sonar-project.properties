sonar.projectKey=devsync
sonar.projectName=DevSync
sonar.projectVersion=1.0

# Backend (Python/Django)
sonar.sources=backend
sonar.exclusions=backend/**/__pycache__/**,backend/**/migrations/**,backend/htmlcov/**,backend/staticfiles/**,backend/media/**,backend/db.sqlite3,frontend/node_modules/**,frontend/.next/**

# Python test coverage
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.version=3.11

# Frontend (JavaScript/TypeScript)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
