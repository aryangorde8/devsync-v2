# =============================================================================
# DevSync - Advanced CI/CD Pipeline
# =============================================================================
# Multi-stage pipeline with:
# - Code quality checks (linting, formatting)
# - Security scanning (Trivy, CodeQL)
# - Testing with coverage reports
# - Docker image building and pushing
# - Kubernetes deployment
# =============================================================================

name: DevSync CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/devsync-backend

jobs:
  # ===========================================================================
  # Stage 1: Code Quality & Linting
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install Python linters
        run: pip install black flake8 isort mypy

      - name: Run Black
        run: black --check --diff backend/
        continue-on-error: true

      - name: Run isort
        run: isort --check-only --diff backend/
        continue-on-error: true

      - name: Run Flake8
        run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ===========================================================================
  # Stage 2: Security Scanning
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check Python dependencies for vulnerabilities
        run: |
          pip install safety
          cd backend && safety check -r requirements.txt --full-report
        continue-on-error: true

  # ===========================================================================
  # Stage 3: Backend Testing
  # ===========================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devsync
          POSTGRES_PASSWORD: devsync
          POSTGRES_DB: devsync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov pytest-django

      - name: Run Django checks
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: 'True'
          DATABASE_URL: postgres://devsync:devsync@localhost:5432/devsync_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python manage.py check
          python manage.py migrate --noinput

      - name: Run pytest with coverage
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DJANGO_DEBUG: 'True'
          DATABASE_URL: postgres://devsync:devsync@localhost:5432/devsync_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          pytest --cov=. --cov-report=xml --cov-report=html -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  # ===========================================================================
  # Stage 4: Build Docker Image
  # ===========================================================================
  build:
    name: Build Backend Image (verify)
    runs-on: ubuntu-latest
    needs: [test-backend, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the backend image to verify it compiles (deps + collectstatic).
      # We don't push to GHCR — the live deploy builds the image on the host.
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: devsync-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # Scan the built image for vulnerabilities
      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsync-backend:ci
          format: 'sarif'
          output: 'trivy-backend.sarif'
        continue-on-error: true

  # ===========================================================================
  # Stage 5: Deploy to EC2 (production, docker-compose + Caddy)
  # Runs only when DEPLOY_TO_EC2 repo variable is "true" and these secrets exist:
  #   EC2_HOST     - public IP / DNS of the instance
  #   EC2_USER     - ssh user (e.g. ubuntu)
  #   EC2_SSH_KEY  - private SSH deploy key (public half in the box's authorized_keys)
  # One-time on the box: stop the old stack, place devsync-v2/.env (prod secrets).
  # ===========================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_TO_EC2 == 'true'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="$HOME/devsync-v2"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/aryangorde8/devsync-v2.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            # Build the Django image (bakes in collectstatic) and (re)start the stack.
            docker build -t devsync-backend:latest --target production -f backend/Dockerfile backend/
            docker compose --profile production up -d --remove-orphans
            docker image prune -f || true

